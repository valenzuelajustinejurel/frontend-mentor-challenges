<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        src="./assets/images/avatar-jessica.jpeg"
        alt="image of Jessica Randall"
        width="88"
        ,
        height="88"
      />
      <h1 class="text-preset-1 card__title">Jessica Randall</h1>
      <p class="text-preset-2-bold card__subtitle card__padding">
        London, United Kingdom
      </p>
      <p class="text-preset-2 card__slogan card__padding">
        "Front-end developer and avid reader."
      </p>

      <nav class="btn">
        <ul>
          <li>
            <a href="http://" class="btn__link text-preset-2-bold">GitHub</a>
          </li>
          <li>
            <a href="http://" class="btn__link text-preset-2-bold"
              >Frontend Mentor</a
            >
          </li>
          <li>
            <a href="http://" class="btn__link text-preset-2-bold">LinkedIn</a>
          </li>
          <li>
            <a href="http://" class="btn__link text-preset-2-bold">Twitter</a>
          </li>
          <li>
            <a href="http://" class="btn__link text-preset-2-bold">Instagram</a>
          </li>
        </ul>
      </nav>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://www.frontendmentor.io/profile/valenzuelajustinejurel"
        >Justine Jurel Valenzuela</a
      >.
    </footer>
  </body>
</html>
